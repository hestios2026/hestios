version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hestios-db
    environment:
      POSTGRES_USER: hestios
      POSTGRES_PASSWORD: hestios_dev_2024
      POSTGRES_DB: hestios
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: hestios-minio
    environment:
      MINIO_ROOT_USER: hestios
      MINIO_ROOT_PASSWORD: hestios_minio_2024
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hestios-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
