version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: hestios-db
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hestios
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOT exposed to host — backend connects via Docker network

  redis:
    image: redis:7-alpine
    container_name: hestios-redis
    restart: unless-stopped
    # NOT exposed to host

  minio:
    image: minio/minio:latest
    container_name: hestios-minio
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: http://erp.hesti-rossmann.de:9000
    ports:
      - "9000:9000"   # S3 API — presigned URLs point here
      - "9001:9001"   # MinIO console (close after setup)
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hestios-backend
    restart: unless-stopped
    env_file: ../.env.prod
    depends_on:
      - postgres
      - redis
      - minio

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hestios-frontend
    restart: unless-stopped
    depends_on:
      - backend

  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: hestios-onlyoffice
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      JWT_ENABLED: "true"
      JWT_HEADER: AuthorizationJwt
      JWT_IN_BODY: "true"
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice

  nginx:
    image: nginx:1.25-alpine
    container_name: hestios-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:latest
    container_name: hestios-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  minio_data:
  certbot_www:
  onlyoffice_data:
  onlyoffice_logs:
