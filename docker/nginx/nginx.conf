resolver 127.0.0.11 valid=10s ipv6=off;

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

upstream onlyoffice {
    server onlyoffice:80;
}

# HTTP — redirect to HTTPS + certbot challenge
server {
    listen 80;
    server_name erp.hesti-rossmann.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name erp.hesti-rossmann.de;

    ssl_certificate     /etc/letsencrypt/live/erp.hesti-rossmann.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.hesti-rossmann.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # OnlyOffice Document Server — prefixed entry point
    location /office/ {
        proxy_pass         http://onlyoffice/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        client_max_body_size 100M;
    }

    # OnlyOffice internal paths — generated by the editor at absolute paths
    location /cache/ {
        proxy_pass         http://onlyoffice/cache/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /doc {
        proxy_pass         http://onlyoffice/doc;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /coauthoring/ {
        proxy_pass         http://onlyoffice/coauthoring/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend (SPA)
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
    }
}
