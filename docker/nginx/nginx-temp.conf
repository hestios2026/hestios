# Temporary nginx config for initial certbot challenge (HTTP only, no SSL)
server {
    listen 80;
    server_name erp.hesti-rossmann.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'HestiOS — SSL setup in progress';
        add_header Content-Type text/plain;
    }
}
